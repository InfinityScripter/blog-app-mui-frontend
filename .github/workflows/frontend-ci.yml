name: frontend-ci

# Quality gate for the frontend. Runs on every PR into main and on direct
# pushes to main. Blocks merge on lint errors, circular dependencies, or a
# broken production build.
#
# Intentionally NOT gated here:
#  - e2e: requires a running backend + seeded Postgres; too heavy for this gate.
#  - knip: reports false positives for some live features, so it runs as a
#    non-blocking report rather than a hard gate.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Circular dependency check
        run: npx madge --circular --extensions ts,tsx src

      - name: Build
        run: yarn build
        env:
          NEXT_PUBLIC_SERVER_URL: http://localhost:7272
          NEXT_PUBLIC_ASSET_URL: http://localhost:7272

      - name: Dead-code report (non-blocking)
        run: yarn knip || true
